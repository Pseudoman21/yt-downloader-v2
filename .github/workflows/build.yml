name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Download ffmpeg
        run: |
          mkdir bin
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          7z e ffmpeg.zip "*/bin/ffmpeg.exe" "*/bin/ffprobe.exe" -obin -r

      - name: Build with PyInstaller
        run: pyinstaller yt_downloader.spec --clean --noconfirm

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path "dist/YT Downloader" -DestinationPath "YT-Downloader-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-windows.zip
          path: YT-Downloader-windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
